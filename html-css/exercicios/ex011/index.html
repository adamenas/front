<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imagens dinâmicas</title>
</head>
<body>
    <p>Imagens que se alteram com o tamanho da tela</p>
    <picture>
        <source media="(max-width: 750px)" srcset="imagens/foto-p.png" type="image/png">
        <source media="(max-width: 1050px)" srcset="imagens/foto-m.png" type="image/png">
        <img src="imagens/foto-g.png" alt="foto grande">
    </picture>
    <h2>Inserindo áudio</h2>
    <p>Tag é <b>audio</b> e precisa da função <b>controls</b> pra aparecer o botão de play</p>
    <audio src="midia/autotunescat.mp3" controls></audio>
</body>
</html>
